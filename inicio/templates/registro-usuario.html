{% load static %}
<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/html">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title> DressMe </title>
    <link rel="icon" href="{% static 'assets/mini-logo.png' %}" class="DressMe">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script src="{% static 'assets/js/registro.js' %}" defer></script>

</head>

<body>

    <main>
        <section class="iniciar-sesion">
            <article class="iniciar-sesion__cambiar-registro">
                <h1 class="iniciar-sesion__titulo">¿Ya tienes una cuenta?</h1>

                <button data-url="{% url 'login' %}" onclick="window.location.href=this.getAttribute('data-url');"
                    class="iniciar-sesion__btn-registro">
                    INICIAR SESIÓN

                </button>

            </article>
            <form class="iniciar-sesion__formulario">
                <img src="{% static 'assets/mini-logo.png' %}" alt="Logo de DressMe" class="iniciar-sesion__logo">
                <h2 class="iniciar-sesion__bienvenida">Regístrate</h2>

                <label for="usuario" class="iniciar-sesion__label">
                    Usuario
                    <input type="text" id="usuario" name="usuario" class="iniciar-sesion__input"
                        placeholder="Tu nombre de usuario" required>
                </label>

                <label for="email" class="iniciar-sesion__label">
                    Correo Electrónico
                    <input type="email" id="email" name="email" class="iniciar-sesion__input"
                        placeholder="Tu correo electrónico" required>
                </label>

                <label for="password" class="iniciar-sesion__label">
                    Contraseña
                    <input type="password" id="password" name="password" class="iniciar-sesion__input"
                        placeholder="Tu contraseña" required>
                </label>

                <label for="password-confirm" class="iniciar-sesion__label">
                    Confirmar Contraseña
                    <input type="password" id="password-confirm" name="password" class="iniciar-sesion__input"
                        placeholder="Confirma tu contraseña" required>
                </label>

                <button type="submit" class="iniciar-sesion__btn-enviar">Registrarse</button>
            </form>

        </section>

    </main>

    <footer>
        <section class="section_footer">
            <a href="index.html" class="footer_logo">
                <img class="footer_logo" src="{% static 'assets/logo.png' %}" alt="logo_dressme">
            </a>
            <nav class="menu_footer">
                <ul class="ul_menu_footer">
                    <li class="li_menu_footer">
                        <a class="politicas_footer" href="">Aviso Legal</a>
                    </li>
                    |
                    <li class="li_menu_footer">
                        <a class="politicas_footer" href="">Política de Privacidad</a>
                    </li>
                    |
                    <li class="li_menu_footer">
                        <a class="politicas_footer" href="">Política de Cookies</a>
                    </li>
                </ul>
            </nav>
            <article class="derechos_footer">
                <p>© 2025 DressMe</p>
                <p>Desarrollado por CodeSHOP</p>
            </article>
        </section>
    </footer>

</body>

</html>
